<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业开户风险值评估系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 1em;
            opacity: 0.9;
        }
        
        .selected-summary {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .selected-summary h4 {
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        .summary-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin: 4px;
            background: #e0e7ff;
            color: #3730a3;
        }
        .summary-tag .remove {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            opacity: 0.6;
        }
        .summary-tag .remove:hover { opacity: 1; }
        .empty-state {
            color: #94a3b8;
            font-size: 0.9em;
            text-align: center;
            padding: 20px;
        }
        
        .dimension-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .dimension-card.required .dimension-header {
            background: linear-gradient(90deg, #fef3c7 0%, #fde68a 100%);
        }
        .dimension-card.required .dimension-header h3::after {
            content: " *必选";
            color: #dc2626;
            font-size: 0.8em;
            font-weight: bold;
        }
        .dimension-header {
            padding: 16px 20px;
            background: linear-gradient(90deg, #f8fafc 0%, #e2e8f0 100%);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.3s;
        }
        .dimension-header:hover {
            background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 100%);
        }
        .dimension-header h3 {
            font-size: 1.15em;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dimension-header .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }
        .dimension-header .arrow {
            font-size: 1.2em;
            color: #64748b;
            transition: transform 0.3s;
        }
        .dimension-card.open .arrow {
            transform: rotate(180deg);
        }
        .dimension-body {
            padding: 16px 20px;
            display: none;
        }
        .dimension-card.open .dimension-body {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .option-item:hover {
            border-color: #94a3b8;
            background: #f1f5f9;
        }
        .option-item.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .option-item.veto {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .option-item.veto.selected {
            border-color: #dc2626;
            background: #fee2e2;
        }
        .option-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option-item.veto input[type="checkbox"] {
            accent-color: #dc2626;
        }
        .option-content { flex: 1; }
        .option-name {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95em;
            line-height: 1.4;
        }
        .option-desc {
            font-size: 0.82em;
            color: #64748b;
            margin-top: 4px;
            line-height: 1.5;
        }
        .option-value { display: none; }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 100;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-submit {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            font-size: 1.1em;
            padding: 14px 48px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }
        
        .result-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .result-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .result-modal {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .result-modal h2 {
            font-size: 1.4em;
            color: #1e293b;
            margin-bottom: 20px;
        }
        .result-score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin: 0 auto 20px;
            transition: all 0.5s ease;
        }
        .result-score-circle .score-num {
            font-size: 3.2em;
            line-height: 1;
        }
        .result-score-circle .score-label {
            font-size: 0.9em;
            margin-top: 6px;
            opacity: 0.95;
        }
        .result-level {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .result-desc {
            color: #64748b;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .result-principle {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .limit-box {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .limit-box .limit-title {
            font-size: 0.9em;
            color: #92400e;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .limit-box .limit-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #b45309;
        }
        .limit-box .limit-range {
            font-size: 0.8em;
            color: #a16207;
            margin-top: 4px;
        }
        
        .result-detail {
            text-align: left;
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-detail h4 {
            font-size: 0.95em;
            color: #1e293b;
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 6px;
        }
        .result-detail-item {
            font-size: 0.85em;
            color: #475569;
            padding: 4px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .result-detail-item:last-child { border-bottom: none; }
        .result-detail-dim {
            font-weight: 600;
            color: #3b82f6;
        }
        .result-detail-val {
            float: right;
            font-weight: 600;
        }
        .result-detail-val.positive { color: #16a34a; }
        .result-detail-val.negative { color: #dc2626; }
        .result-detail-val.veto { color: #7f1d1d; }
        
        .level-excellent { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .level-good { background: linear-gradient(135deg, #84cc16, #65a30d); }
        .level-normal { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .level-warning { background: linear-gradient(135deg, #f97316, #ea580c); }
        .level-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .level-veto { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
        
        .principle-excellent { background: #dcfce7; color: #166534; }
        .principle-good { background: #dcfce7; color: #166534; }
        .principle-normal { background: #fef9c3; color: #854d0e; }
        .principle-warning { background: #ffedd5; color: #9a3412; }
        .principle-danger { background: #fee2e2; color: #991b1b; }
        .principle-veto { background: #fecaca; color: #7f1d1d; }
        
        .veto-badge {
            background: #dc2626;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .toast-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .toast-overlay.show { display: flex; }
        .toast-modal {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .toast-modal .toast-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }
        .toast-modal .toast-text {
            font-size: 1.1em;
            color: #1e293b;
            margin-bottom: 16px;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.6em; }
            .result-modal { padding: 24px; }
            .result-score-circle { width: 130px; height: 130px; }
            .result-score-circle .score-num { font-size: 2.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 企业开户风险值评估系统</h1>
            <p>请勾选各维度对应的风险情形，完成后点击提交查看评估结果</p>
        </div>
        
        <div class="selected-summary" id="selectedSummary">
            <h4>📋 已选风险项</h4>
            <div id="summaryContent">
                <div class="empty-state">暂无选择，请从下方各维度勾选对应情形</div>
            </div>
        </div>
        
        <div id="dimensions"></div>
    </div>
    
    <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="resetAll()">🔄 重置</button>
        <button class="btn btn-submit" onclick="submitResult()">✅ 提交评估</button>
    </div>
    
    <div class="result-overlay" id="resultOverlay" onclick="closeResult(event)">
        <div class="result-modal" onclick="event.stopPropagation()">
            <h2>📊 企业开户风险评估结果</h2>
            <div class="result-score-circle level-excellent" id="resultScoreCircle">
                <div class="score-num" id="resultScoreNum">100</div>
                <div class="score-label">风险值</div>
            </div>
            <div class="veto-badge" id="resultVetoBadge" style="display:none;">⚠️ 一票否决 - 禁止开户</div>
            <div class="result-level" id="resultLevel" style="color: #16a34a;">极低风险</div>
            <div class="result-principle principle-excellent" id="resultPrinciple">标准管控</div>
            
            <div class="limit-box" id="limitBox">
                <div class="limit-title">💰 非柜面最高限额</div>
                <div class="limit-value" id="limitValue">30万</div>
                <div class="limit-range" id="limitRange">安全系数：80 &lt; 分数 ≤ 100</div>
            </div>
            
            <div class="result-desc" id="resultDesc">低风险实体大中型经营主体</div>
            
            <div class="result-detail" id="resultDetail">
                <h4>📋 评估明细</h4>
                <div id="resultDetailContent"></div>
            </div>
            
            <button class="btn btn-primary" onclick="closeResult()" style="margin-right: 8px;">关闭</button>
            <button class="btn btn-secondary" onclick="exportFromModal()">📄 导出报告</button>
        </div>
    </div>
    
    <div class="toast-overlay" id="toastOverlay" onclick="closeToast()">
        <div class="toast-modal" onclick="event.stopPropagation()">
            <div class="toast-icon" id="toastIcon">⚠️</div>
            <div class="toast-text" id="toastText">请先选择企业类型</div>
            <button class="btn btn-primary" onclick="closeToast()">知道了</button>
        </div>
    </div>

<script>
// ==================== 新版风险数据（最终版）====================
const riskData = {
    "企业类型": {
        icon: "🏢",
        color: "#3b82f6",
        required: true,
        items: [
            {name: "生产制造企业、全国连锁商超、区域性医药连锁机构、一级建筑总承包企业区域、连锁餐饮品牌、连锁医药药房、汽车4S经销门店、母婴连锁门店、线下建材批发商户、本土中型工程施工企业等", value: 100, level: "低风险实体大中型经营主体", desc: "低风险实体大中型经营主体", principle: "标准管控"},
            {name: "生鲜果品门店、餐饮个体门店、烘焙经营门店、机动车维修门店、烟酒专营门店、社区家政服务机构、物业服务企业、广告设计机构、线下健身及摄影实体门店、线下美业休闲实体等", value: 90, level: "低风险小微线下实体门店", desc: "低风险小微线下实体门店", principle: "标准管控"},
            {name: "人力资源劳务派遣企业、咨询机构、电商平台企业店铺、短视频本地生活实体商户、企业管理咨询、中介服务机构、文化传媒机构，包括各类线上服务机构等", value: 80, level: "线上线下融合实体商户", desc: "线上线下融合实体商户", principle: "标准管控"},
            {name: "信息技术服务企业、无实体贸易、居间贸易且企业名称含科技、商贸、贸易等", value: 70, level: "中风险专业技术服务类", desc: "中风险专业技术服务类", principle: "标准管控"},
            {name: "虚拟货币、外汇兑换、无资质投融资、不明跨境居间、大宗无货贸易等", value: 60, level: "中高风险居间中介结算类", desc: "中高风险居间中介结算类", principle: "标准管控"},
        ]
    },
    "法人、实际控制人资质": {
        icon: "👤",
        color: "#8b5cf6",
        items: [
            {name: "精准治平台核查显示高危", value: -30, desc: "人员负面记录，涉诈前科高危人员"},
            {name: "精准治平台核查显示可疑", value: -15, desc: "人员负面记录，公安分析出的可疑数据"},
            {name: "法定代表人同时兼任3家及以上企业", value: -10, desc: "同一自然人同时登记为3户及以上企业法人，大概率存在挂名代持、身份出借，易多头资金混用，空壳企业风险偏高"},
            {name: "企业股权架构层级≥5层，多层嵌套隐蔽实控", value: -5, desc: "股权穿透后持股层级达到三层及以上，链条冗长，实际控制人难以快速识别，存在隐匿主体、规避监管核查隐患"},
            {name: "法定代表人年龄≤22周岁或≥65周岁", value: -20, desc: "年龄偏小普遍缺乏经营实力与行业经验，多出借证件挂名；年龄偏大经营管控能力弱，易交由他人操控账户，资金失控风险大"},
            {name: "法定代表人持有未解除限制高消费令", value: -10, desc: "法人、实控人现存有效未结清限高文书，背负未履行债务，存在企业资产转移、账户被司法冻结扣划风险"},
            {name: "法定代表人户籍地与企业经营地分属不同省份", value: -5, desc: "人员户籍和企业实际经营场地跨省分离，线下约谈、上门核验难度大，企业出现异常后人员追查处置成本高"},
        ]
    },
    "注册及经营场所情况": {
        icon: "📍",
        color: "#f59e0b",
        items: [
            {name: "注册地址虚假不实、无法联系送达", value: -100, desc: "实地核查无该经营场所、物业/房东无法联系企业，信函上门无法签收，无实际经营痕迹", veto: true},
            {name: "注册地址为集群托管、商务秘书、孵化基地等虚拟地址，无实体办公场所", value: -20, desc: "地址仅提供注册挂靠服务，无固定独立办公区域、无常驻办公人员，无实地经营条件"},
            {name: "一址多照登记多家企业，或短期内频繁变更注册地址", value: -20, desc: "同一地址登记2家及以上企业；成立后短时间多次变更工商注册地址，规避实地核查"},
            {name: "注册地与实际经营场所分离，暂无迁址变更规划且无合理理由", value: -10, desc: "工商注册地址与实际办公经营场地分属不同区域，企业短期内不计划变更工商登记地址，异地核查难度大"},
            {name: "实际经营场所与主营业务明显不匹配", value: -20, desc: "场地规模、配套设施、场地类型无法支撑营业执照登记的主营行业开展经营"},
            {name: "经营场所短期租赁（租期不足3个月）或位于居民住宅", value: -15, desc: "租赁协议有效期不足3个月；场地性质为纯住宅，不符合商事经营场所规范，存续经营风险高"},
        ]
    },
    "资料审查": {
        icon: "📑",
        color: "#ec4899",

let selectedItems = {};
let lastCalculatedResult = null;

function init() {
    renderDimensions();
    updateSummary();
}

function renderDimensions() {
    const container = document.getElementById('dimensions');
    let html = '';
    
    for (const [dimName, dimData] of Object.entries(riskData)) {
        const requiredClass = dimData.required ? 'required' : '';
        html += `
        <div class="dimension-card ${requiredClass}" id="card-${dimName.replace(/[、,\\s]+/g, '-').replace(/[（）()]/g, '')}">
            <div class="dimension-header" onclick="toggleCard(this)">
                <h3>
                    <span class="icon" style="background: ${dimData.color}20; color: ${dimData.color};">${dimData.icon}</span>
                    ${dimName}
                </h3>
                <span class="arrow">▼</span>
            </div>
            <div class="dimension-body">
                ${dimData.items.map((item, idx) => `
                    <div class="option-item ${item.veto ? 'veto' : ''}" 
                         onclick="toggleItem('${dimName}', ${idx}, event)"
                         id="item-${dimName.replace(/[、,\\s]+/g, '-').replace(/[（）()]/g, '')}-${idx}">
                        <input type="checkbox" 
                               ${dimName === '企业类型' ? 'name="enterpriseType"' : ''}
                               onchange="toggleItem('${dimName}', ${idx}, event)"
                               id="cb-${dimName.replace(/[、,\\s]+/g, '-').replace(/[（）()]/g, '')}-${idx}">
                        <div class="option-content">
                            <div class="option-name">${item.name}</div>
                            ${item.desc ? `<div class="option-desc">${item.desc}</div>` : ''}
                        </div>
                        <div class="option-value ${item.veto ? 'value-veto' : (item.value > 0 ? 'value-positive' : 'value-negative')}">
                            ${item.veto ? '一票否决' : (item.value > 0 ? '+' : '') + item.value}
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
        `;
    }
    
    container.innerHTML = html;
}

function toggleCard(header) {
    const card = header.closest('.dimension-card');
    card.classList.toggle('open');
}

function toggleItem(dimName, idx, event) {
    event.stopPropagation();
    
    const item = riskData[dimName].items[idx];
    const key = `${dimName}-${idx}`;
    const safeId = dimName.replace(/[、,\\s]+/g, '-').replace(/[（）()]/g, '');
    const checkbox = document.getElementById(`cb-${safeId}-${idx}`);
    const optionEl = document.getElementById(`item-${safeId}-${idx}`);
    
    if (dimName === '企业类型') {
        for (let i = 0; i < riskData[dimName].items.length; i++) {
            const otherKey = `${dimName}-${i}`;
            if (otherKey !== key && selectedItems[otherKey]) {
                delete selectedItems[otherKey];
                const otherSafeId = dimName.replace(/[、,\\s]+/g, '-').replace(/[（）()]/g, '');
                const otherCb = document.getElementById(`cb-${otherSafeId}-${i}`);
                const otherEl = document.getElementById(`item-${otherSafeId}-${i}`);
                if (otherCb) otherCb.checked = false;
                if (otherEl) otherEl.classList.remove('selected');
            }
        }
    }
    
    if (selectedItems[key]) {
        delete selectedItems[key];
        checkbox.checked = false;
        optionEl.classList.remove('selected');
    } else {
        selectedItems[key] = { dimName, idx, item };
        checkbox.checked = true;
        optionEl.classList.add('selected');
    }
    
    updateSummary();
}

function updateSummary() {
    const container = document.getElementById('summaryContent');
    const items = Object.values(selectedItems);
    
    if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无选择，请从下方各维度勾选对应情形</div>';
        return;
    }
    
    let html = '';
    items.forEach(data => {
        const item = data.item;
        html += `
            <span class="summary-tag" style="background: #e0e7ff; color: #3730a3; border: 1px solid #c7d2fe;">
                ${data.dimName}: ${item.name.substring(0, 20)}${item.name.length > 20 ? '...' : ''}
                <span class="remove" onclick="removeItem('${data.dimName}', ${data.idx}, event)">×</span>
            </span>
        `;
    });
    container.innerHTML = html;
}

function removeItem(dimName, idx, event) {
    event.stopPropagation();
    toggleItem(dimName, idx, { stopPropagation: () => {} });
}

function resetAll() {
    selectedItems = {};
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
    updateSummary();
    closeResult();
}

// ==================== 新版限额标准（左开右闭）====================
// 80 < 分数 ≤ 100 → 30万
// 70 < 分数 ≤ 80  → 10万
// 60 < 分数 ≤ 70  → 5万
// 50 < 分数 ≤ 60  → 2.5万
// 40 < 分数 ≤ 50  → 1万
// 0  < 分数 ≤ 40  → 0.5万
// 分数 = 0         → 0万
function getLimitInfo(score) {
    if (score === 0) {
        return { limit: '0万', range: '安全系数：0（一票否决）' };
    } else if (score > 80) {
        return { limit: '30万', range: '安全系数：80 < 分数 ≤ 100' };
    } else if (score > 70) {
        return { limit: '10万', range: '安全系数：70 < 分数 ≤ 80' };
    } else if (score > 60) {
        return { limit: '5万', range: '安全系数：60 < 分数 ≤ 70' };
    } else if (score > 50) {
        return { limit: '2.5万', range: '安全系数：50 < 分数 ≤ 60' };
    } else if (score > 40) {
        return { limit: '1万', range: '安全系数：40 < 分数 ≤ 50' };
    } else {
        return { limit: '0.5万', range: '安全系数：0 < 分数 ≤ 40' };
    }
}

function calculateResult() {
    let baseScore = 0;
    let hasEnterpriseType = false;
    let hasVeto = false;
    let vetoReasons = [];
    let selectedPrinciple = "标准管控";
    let selectedLevel = "低风险实体大中型经营主体";
    let detailItems = [];
    
    for (const [key, data] of Object.entries(selectedItems)) {
        if (data.dimName === '企业类型') {
            baseScore = data.item.value;
            hasEnterpriseType = true;
            selectedPrinciple = data.item.principle || "标准管控";
            selectedLevel = data.item.level;
            detailItems.push({ dim: data.dimName, name: data.item.name, value: data.item.value, isBase: true });
            break;
        }
    }
    
    if (!hasEnterpriseType) {
        return null;
    }
    
    for (const [key, data] of Object.entries(selectedItems)) {
        if (data.dimName === '企业类型') continue;
        
        const item = data.item;
        if (item.veto) {
            hasVeto = true;
            vetoReasons.push(item.name);
            detailItems.push({ dim: data.dimName, name: item.name, value: item.value, isVeto: true });
        } else {
            baseScore += item.value;
            detailItems.push({ dim: data.dimName, name: item.name, value: item.value });
        }
    }
    
    let finalScore = Math.max(0, Math.min(100, baseScore));
    if (hasVeto) finalScore = 0;
    
    return { finalScore, hasVeto, vetoReasons, selectedPrinciple, selectedLevel, detailItems };
}

function showToast(icon, text) {
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastText').textContent = text;
    document.getElementById('toastOverlay').classList.add('show');
}

function closeToast() {
    document.getElementById('toastOverlay').classList.remove('show');
}

function submitResult() {
    const result = calculateResult();
    
    if (result === null) {
        showToast('⚠️', '请先选择【企业类型】');
        const card = document.getElementById('card-企业类型');
        if (card) card.classList.add('open');
        return;
    }
    
    lastCalculatedResult = result;
    
    const overlay = document.getElementById('resultOverlay');
    const scoreCircle = document.getElementById('resultScoreCircle');
    const scoreNum = document.getElementById('resultScoreNum');
    const level = document.getElementById('resultLevel');
    const desc = document.getElementById('resultDesc');
    const principle = document.getElementById('resultPrinciple');
    const vetoBadge = document.getElementById('resultVetoBadge');
    const limitValue = document.getElementById('limitValue');
    const limitRange = document.getElementById('limitRange');
    const detailContent = document.getElementById('resultDetailContent');
    
    scoreNum.textContent = result.finalScore;
    
    scoreCircle.className = 'result-score-circle';
    level.style.color = '';
    principle.className = 'result-principle';
    
    if (result.hasVeto) {
        scoreCircle.classList.add('level-veto');
        level.textContent = '一票否决 - 禁止开户';
        level.style.color = '#7f1d1d';
        desc.textContent = '存在以下一票否决情形：' + result.vetoReasons.join('、');
        principle.classList.add('principle-veto');
        principle.textContent = '暂停开户';
        vetoBadge.style.display = 'inline-block';
        limitValue.textContent = '0万';
        limitRange.textContent = '安全系数：0（一票否决）';
    } else if (result.finalScore > 80) {
        scoreCircle.classList.add('level-excellent');
        level.textContent = result.selectedLevel;
        level.style.color = '#16a34a';
        desc.textContent = result.selectedLevel;
        principle.classList.add('principle-excellent');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else if (result.finalScore > 70) {
        scoreCircle.classList.add('level-good');
        level.textContent = result.selectedLevel;
        level.style.color = '#65a30d';
        desc.textContent = result.selectedLevel;
        principle.classList.add('principle-good');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else if (result.finalScore > 60) {
        scoreCircle.classList.add('level-normal');
        level.textContent = result.selectedLevel;
        level.style.color = '#ca8a04';
        desc.textContent = result.selectedLevel;
        principle.classList.add('principle-normal');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else if (result.finalScore > 50) {
        scoreCircle.classList.add('level-warning');
        level.textContent = result.selectedLevel;
        level.style.color = '#ea580c';
        desc.textContent = result.selectedLevel;
        principle.classList.add('principle-warning');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else if (result.finalScore > 40) {
        scoreCircle.classList.add('level-danger');
        level.textContent = '高风险 - 建议从严管控';
        level.style.color = '#dc2626';
        desc.textContent = '安全系数低于50分，建议从严管控';
        principle.classList.add('principle-danger');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else if (result.finalScore > 0) {
        scoreCircle.classList.add('level-danger');
        level.textContent = '极高风险 - 建议拒绝开户';
        level.style.color = '#dc2626';
        desc.textContent = '安全系数低于40分，建议拒绝开户';
        principle.classList.add('principle-danger');
        principle.textContent = result.selectedPrinciple;
        vetoBadge.style.display = 'none';
        const info = getLimitInfo(result.finalScore);
        limitValue.textContent = info.limit;
        limitRange.textContent = info.range;
    } else {
        scoreCircle.classList.add('level-veto');
        level.textContent = '一票否决 - 禁止开户';
        level.style.color = '#7f1d1d';
        desc.textContent = '安全系数为0，禁止开户';
        principle.classList.add('principle-veto');
        principle.textContent = '暂停开户';
        vetoBadge.style.display = 'inline-block';
        limitValue.textContent = '0万';
        limitRange.textContent = '安全系数：0';
    }
    
    let detailHtml = '';
    result.detailItems.forEach(d => {
        let valClass = d.value > 0 ? 'positive' : (d.value < 0 ? 'negative' : '');
        if (d.isVeto) valClass = 'veto';
        let valText = d.isVeto ? '一票否决' : (d.value > 0 ? '+' : '') + d.value;
        detailHtml += `<div class="result-detail-item">
            <span class="result-detail-dim">${d.dim}</span>: ${d.name.substring(0, 40)}${d.name.length > 40 ? '...' : ''}
            <span class="result-detail-val ${valClass}">${valText}</span>
        </div>`;
    });
    detailContent.innerHTML = detailHtml;
    
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeResult(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('resultOverlay').classList.remove('show');
    document.body.style.overflow = '';
}

function exportFromModal() {
    const result = lastCalculatedResult || calculateResult();
    const now = new Date();
    const dateStr = now.toLocaleString('zh-CN');
    
    let levelText = document.getElementById('resultLevel').textContent;
    let principleText = document.getElementById('resultPrinciple').textContent;
    let descText = document.getElementById('resultDesc').textContent;
    let limitText = document.getElementById('limitValue').textContent;
    let rangeText = document.getElementById('limitRange').textContent;
    
    let report = `============================================\n`;
    report += `     企业开户风险值评估报告\n`;
    report += `============================================\n`;
    report += `评估时间：${dateStr}\n`;
    report += `------------------------------------------\n`;
    report += `【综合风险值】${result.finalScore} 分\n`;
    report += `【风险等级】${levelText}\n`;
    report += `【管控原则】${principleText}\n`;
    report += `【非柜面最高限额】${limitText}\n`;
    report += `【${rangeText}】\n`;
    report += `【评估说明】${descText}\n`;
    report += `------------------------------------------\n`;
    report += `【评估明细】\n`;
    
    result.detailItems.forEach(d => {
        let valText = d.isVeto ? '一票否决' : (d.value > 0 ? '+' : '') + d.value;
        report += `■ ${d.dim}: ${d.name} [${valText}]\n`;
    });
    
    report += `\n------------------------------------------\n`;
    report += `评估人签字：_______________\n`;
    report += `复核人签字：_______________\n`;
    report += `============================================\n`;
    
    const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `企业风险值评估报告_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
